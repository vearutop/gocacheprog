name: test-unit
on:
  pull_request:
env:
  GO111MODULE: "on"
jobs:
  test:
    strategy:
      matrix:
        go-version: [ stable ]
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download gocacheprog
        run: |
          wget -q -O /tmp/gocacheprog https://github.com/vearutop/gocacheprogd/releases/download/dev/gocacheprog
          chmod +x /tmp/gocacheprog

      # Go test cache includes file mtimes for some repo-local inputs.
      # Canonicalize them so fresh CI checkouts get stable cache keys.
      - name: Canonicalize Timestamps
        run: |
          /tmp/gocacheprog -canonicalize-timestamps .

      - name: Setup gocacheprog
        shell: bash
        run: |
          export BASE_COMMIT="${{ github.event.pull_request.base.sha }}"
          export COMMIT="${{ github.event.pull_request.head.sha }}"
          export CHANGES_ID="${{ github.repository }}#${{ github.event.pull_request.number }}"
          export BUILD_TYPE="unit"
          export LOG_DISCARD=1
          export GOMAXPROCS=100

          EXTRA_FLAGS="-commit ${COMMIT} -changes-id ${CHANGES_ID} -build-type ${BUILD_TYPE} -base-commit ${BASE_COMMIT}"

          export GOCACHEPROG="/tmp/gocacheprog -cache-dir ./build-cache ${EXTRA_FLAGS} -remote-url https://eq.p1cs.art -preload -preload-size 3000000"
          time go test -parallel 50 ./...
