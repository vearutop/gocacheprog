name: test-unit
on:
  pull_request:
env:
  GO111MODULE: "on"
jobs:
  test:
    strategy:
      matrix:
        go-version: [ stable ]
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download gocacheprog
        run: |
          wget -q -O /tmp/gocacheprog https://github.com/vearutop/gocacheprogd/releases/download/dev/gocacheprog
          chmod +x /tmp/gocacheprog

      # Go test cache includes file mtimes for some repo-local inputs.
      # Canonicalize them so fresh CI checkouts get stable cache keys.
      - name: Canonicalize Timestamps
        run: |
          /tmp/gocacheprog -canonicalize-timestamps .

      - name: Setup gocacheprog
        run: |
          BASE_COMMIT="${{ github.event.pull_request.base.sha }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          CHANGES_ID="${{ github.repository }}#${{ github.event.pull_request.number }}"
          BUILD_TYPE="unit"
          DAEMON_SOCKET="/tmp/gocacheprog.sock"
          DAEMON_PID_FILE="/tmp/gocacheprog.pid"
          DAEMON_LOG="/tmp/gocacheprog-daemon.log"

          EXTRA_FLAGS="-commit ${COMMIT} -changes-id ${CHANGES_ID} -build-type ${BUILD_TYPE} -base-commit ${BASE_COMMIT}"

          /tmp/gocacheprog \
            -daemon \
            -daemon-socket "${DAEMON_SOCKET}" \
            -cache-dir ./build-cache \
            ${EXTRA_FLAGS} \
            -remote-url https://eq.p1cs.art \
            -preload \
            -preload-size 3000000 \
            >"${DAEMON_LOG}" 2>&1 &
          echo $! > "${DAEMON_PID_FILE}"

          {
            echo "GOCACHEPROG=/tmp/gocacheprog -daemon-socket ${DAEMON_SOCKET}"
            echo "LOG_DISCARD=1"
            echo "GOMAXPROCS=100"
            echo "GOCACHEPROG_DAEMON_PID_FILE=${DAEMON_PID_FILE}"
            echo "GOCACHEPROG_DAEMON_LOG=${DAEMON_LOG}"
          } >> "$GITHUB_ENV"

      - name: Test
        shell: bash
        run: |
          time go test -parallel 50 ./...

      - name: Stop gocacheprog daemon
        if: ${{ always() }}
        shell: bash
        run: |
          if [[ -f "${GOCACHEPROG_DAEMON_PID_FILE}" ]]; then
            kill "$(cat "${GOCACHEPROG_DAEMON_PID_FILE}")" || true
            wait "$(cat "${GOCACHEPROG_DAEMON_PID_FILE}")" 2>/dev/null || true
          fi
          if [[ -f "${GOCACHEPROG_DAEMON_LOG}" ]]; then
            tail -n 200 "${GOCACHEPROG_DAEMON_LOG}" || true
          fi
