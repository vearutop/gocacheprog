name: test-unit-shim
on:
  push:
    branches:
      - master
      - main
  pull_request:
env:
  GO111MODULE: "on"
jobs:
  test:
    strategy:
      matrix:
        go-version: [ stable ]
    runs-on: ubuntu-latest
    steps:
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download gocacheprog
        run: |
          wget -q -O /tmp/gocacheprog.tar.gz https://github.com/vearutop/gocacheprog/releases/latest/download/linux_amd64.tar.gz
          tar xf /tmp/gocacheprog.tar.gz -C /tmp
          rm /tmp/gocacheprog.tar.gz

      # Go test cache includes file mtimes for some repo-local inputs.
      # Canonicalize them so fresh CI checkouts get stable cache keys.
      - name: Canonicalize Timestamps
        run: |
          /tmp/gocacheprog -canonicalize-timestamps .

      - name: Setup gocacheprog for PR
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          BASE_COMMIT="${{ github.event.pull_request.base.sha }}"
          COMMIT="${{ github.event.pull_request.head.sha }}"
          CHANGES_ID="${{ github.repository }}#${{ github.event.pull_request.number }}"
          BUILD_TYPE="${GITHUB_REPOSITORY//\//-}-unit"
          AUTH_TOKEN="<key>"
          REMOTE_URL="https://gocache.example.com"
          DAEMON_SOCKET="unix:///tmp/gocacheprog.sock"
          DAEMON_PID_FILE="/tmp/gocacheprog.pid"
          DAEMON_LOG="/tmp/gocacheprog-daemon.log"

          EXTRA_FLAGS="-commit ${COMMIT} -changes-id ${CHANGES_ID} -build-type ${BUILD_TYPE} -base-commit ${BASE_COMMIT}"

          /tmp/gocacheprog \
            -http "${DAEMON_SOCKET}" \
            -auth-token "${AUTH_TOKEN}" \
            -cache-dir ./build-cache \
            ${EXTRA_FLAGS} \
            -remote-url "${REMOTE_URL}" \
            -preload \
            -max-file-bytes 3000000 \
            >"${DAEMON_LOG}" 2>&1 &
          echo $! > "${DAEMON_PID_FILE}"

          {
            echo "GOCACHEPROG=/tmp/gocacheprog -auth-token ${AUTH_TOKEN} -remote-url ${DAEMON_SOCKET}"
            echo "GOMAXPROCS=100"
            echo "GOCACHEPROG_DAEMON_PID_FILE=${DAEMON_PID_FILE}"
            echo "GOCACHEPROG_DAEMON_LOG=${DAEMON_LOG}"
            echo "GOCACHEPROG_AUTH_TOKEN=${AUTH_TOKEN}"
            echo "GOCACHEPROG_SOCKET=${DAEMON_SOCKET}"
          } >> "$GITHUB_ENV"

      - name: Setup gocacheprog for main/master
        if: ${{ github.event_name == 'push' }}
        run: |
          COMMIT="${{ github.sha }}"
          BUILD_TYPE="${GITHUB_REPOSITORY//\//-}-unit"
          AUTH_TOKEN="<key>"
          REMOTE_URL="https://gocache.example.com"
          DAEMON_SOCKET="unix:///tmp/gocacheprog.sock"
          DAEMON_PID_FILE="/tmp/gocacheprog.pid"
          DAEMON_LOG="/tmp/gocacheprog-daemon.log"

          EXTRA_FLAGS="-commit ${COMMIT} -build-type ${BUILD_TYPE}"

          /tmp/gocacheprog \
            -http "${DAEMON_SOCKET}" \
            -auth-token "${AUTH_TOKEN}" \
            -cache-dir ./build-cache \
            ${EXTRA_FLAGS} \
            -remote-url "${REMOTE_URL}" \
            -preload \
            -max-file-bytes 3000000 \
            >"${DAEMON_LOG}" 2>&1 &
          echo $! > "${DAEMON_PID_FILE}"

          {
            echo "GOCACHEPROG=/tmp/gocacheprog -auth-token ${AUTH_TOKEN} -remote-url ${DAEMON_SOCKET}"
            echo "GOMAXPROCS=100"
            echo "GOCACHEPROG_DAEMON_PID_FILE=${DAEMON_PID_FILE}"
            echo "GOCACHEPROG_DAEMON_LOG=${DAEMON_LOG}"
            echo "GOCACHEPROG_AUTH_TOKEN=${AUTH_TOKEN}"
            echo "GOCACHEPROG_SOCKET=${DAEMON_SOCKET}"
          } >> "$GITHUB_ENV"

      - name: Test
        shell: bash
        run: |
          time go test -parallel 50 ./...

      - name: Stop gocacheprog daemon
        if: ${{ always() }}
        shell: bash
        run: |
          /tmp/gocacheprog -auth-token "${GOCACHEPROG_AUTH_TOKEN}" -stop "${GOCACHEPROG_SOCKET}" || true
          if [[ -f "${GOCACHEPROG_DAEMON_LOG}" ]]; then
            tail -n 200 "${GOCACHEPROG_DAEMON_LOG}" || true
          fi
